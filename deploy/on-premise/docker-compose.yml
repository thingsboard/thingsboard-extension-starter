services:
  extension:
    container_name: thingsboard-extension
    image: ${IMAGE_NAME:-thingsboard-extension}
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8090}:8090"
    environment:
      THINGSBOARD_URL: ${THINGSBOARD_URL:-http://host.docker.internal:8080}
      JAVA_OPTS: ${JAVA_OPTS:-}
      TB_AUTH_API_KEY: ${TB_AUTH_API_KEY:-}
      TB_AUTH_USERNAME: ${TB_AUTH_USERNAME:-}
      TB_AUTH_PASSWORD: ${TB_AUTH_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - ./config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
