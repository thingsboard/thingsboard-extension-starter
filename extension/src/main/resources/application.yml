# Port the extension service listens on
server:
  port: ${SERVER_PORT:8090}

thingsboard:
  # ThingsBoard base URL — where the platform is running
  url: ${THINGSBOARD_URL:http://localhost:8080}
  client:
    # How long to keep authenticated ThingsBoard clients in cache (minutes).
    # After expiry, the next request with that API key creates a fresh client.
    cache-ttl: ${TB_CLIENT_CACHE_TTL:60}
    # Maximum number of cached ThingsBoard clients (one per unique API key)
    cache-max-size: ${TB_CLIENT_CACHE_MAX_SIZE:100}
  auth:
    # Optional ThingsBoard credentials for the shared ThingsboardClient bean.
    # Used by scheduled tasks, background jobs, and any code outside HTTP request context.
    # Set EITHER api-key OR username+password. If both are set, api-key takes precedence.
    # Leave blank to skip — only request-based auth (via X-Authorization header) will be available.
    api-key: ${TB_AUTH_API_KEY:}
    username: ${TB_AUTH_USERNAME:}
    password: ${TB_AUTH_PASSWORD:}

spring:
  threads:
    # Use virtual threads for better concurrency with blocking ThingsBoard API calls
    virtual:
      enabled: true

springdoc:
  swagger-ui:
    # Persist X-Authorization across page refreshes (stored in browser localStorage)
    persist-authorization: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}
